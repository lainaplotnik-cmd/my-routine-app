<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>Morning + Evening</title>

<!-- PWA setup -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#FDF8FF" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Routine" />
<link rel="apple-touch-icon" href="icon-192.png" />

<style>
  html, body { margin:0; padding:0; background:#FDF8FF; -webkit-tap-highlight-color: transparent; }
  body { overscroll-behavior: none; }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<!-- React + ReactDOM (production builds) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<!-- Babel standalone so the browser can run JSX directly, no build step -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="react" src="app.jsx"></script>

<script type="text/babel" data-presets="react">
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(React.createElement(Gate));
</script>

<!-- Register service worker for offline + installability -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    });
  }
</script>
</body>
</html>
